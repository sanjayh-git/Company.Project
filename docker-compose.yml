services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: sqlserver2019
    env_file:
      - ./sql.env
    networks:
      - dev_network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $$MSSQL_SA_PASSWORD -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      retries: 10
      start_period: 10s
      timeout: 3s
    ports:
      - "1433:1433"
    hostname: sqlserver
    restart: unless-stopped
      
  api:
    build:
      context: .
      dockerfile: /src/Company.Project.Api/Dockerfile
    container_name: ensek-meter-readings-api
    networks:
      - dev_network
    ports:
      - "8080:8080"
    depends_on:
      sqlserver:
        condition: service_healthy

  ui:
    build:
      context: .
      dockerfile: /src/ensek-meter-readings-ui/Dockerfile
    container_name: ensek-meter-readings-ui
    networks:
      - dev_network
    ports:
      - "4200:80"
    depends_on:
      - api

networks:
  dev_network: {}