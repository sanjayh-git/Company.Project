<div class="card">
  <h2>Meter Readings</h2>

  <div *ngIf="loading">Loading meter readings...</div>
  <div *ngIf="error" class="error">{{ error }}</div>

  <table *ngIf="!loading && !error && readings.length" class="table">
    <thead>
      <tr>
        <th>Id</th>
        <th>AccountId</th>
        <th>Date/Time</th>
        <th>Value</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let r of readings">
        <td>{{ r.id }}</td>
        <td>{{ r.accountId }}</td>
        <td>{{ r.readingDateTime | date: 'dd/MM/yyyy HH:mm' }}</td>
        <td>{{ r.readingValue }}</td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="!loading && !error && !readings.length">
    No meter readings found.
  </div>
</div>
