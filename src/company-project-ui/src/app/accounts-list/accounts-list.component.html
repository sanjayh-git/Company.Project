<div class="card">
  <h2>Accounts</h2>

  <div *ngIf="loading">Loading accounts...</div>
  <div *ngIf="error" class="error">{{ error }}</div>

  <table *ngIf="!loading && !error && accounts.length" class="table">
    <thead>
      <tr>
        <th>AccountId</th>
        <th>First name</th>
        <th>Last name</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let a of accounts">
        <td>{{ a.accountId }}</td>
        <td>{{ a.firstName }}</td>
        <td>{{ a.lastName }}</td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="!loading && !error && !accounts.length">
    No accounts found.
  </div>
</div>
